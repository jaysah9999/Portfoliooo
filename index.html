<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Sidebar</title>

  <link rel="stylesheet" href="style.css">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- Toggle Button -->
<div class="toggle-btn" onclick="toggleSidebar()">
  <i class="fa fa-bars"></i>
</div>

<!-- Sidebar -->
<div class="sidebar">
  
  <div class="profile">
    <img src="profile.jpg" alt="Profile">
    <h2>Jay Sah</h2>
  </div>

  <div class="social-icons">
    <a href="#"><i class="fab fa-x-twitter"></i></a>
    <a href="#"><i class="fab fa-facebook-f"></i></a>
    <a href="#"><i class="fab fa-instagram"></i></a>
    <a href="#"><i class="fab fa-linkedin-in"></i></a>
  </div>

  <div class="menu">
    <a href="#" onclick="event.preventDefault(); showSection('home')">Home</a>
    <a href="#" onclick="event.preventDefault(); showSection('about')">About</a>
    <a href="#" onclick="event.preventDefault(); showSection('resume')">Resume</a>
    <a href="#" onclick="event.preventDefault(); showSection('portfolio')">Portfolio</a>
    <a href="#" onclick="event.preventDefault(); showSection('contact')">Contact</a>
  </div>

</div>

<!-- Main Content -->
<div class="main">

  <section id="home" class="section active hero">
    <div class="hero-left">
      <h1>Hi, I'm <span>Jay</span> 👋</h1>
      <h2><span id="typing"></span></h2>
      <p>I build modern, responsive websites.</p>

      <div class="hero-buttons">
        <button>Hire Me</button>
        <button class="outline">Download CV</button>
      </div>
    </div>

    <div class="hero-right">
  
    </div>
  </section>
  
  <section id="about" class="section">
    <h1>About Me</h1>
    <p>I design and develop modern websites.</p>
  </section>

  <section id="resume" class="section">
    <h1>Resume</h1>
    <p>Your resume details here.</p>
  </section>

  <section id="portfolio" class="section">
    <h1>Portfolio</h1>
  <div class="projects">

    <div class="card">
      <img src="https://picsum.photos/300/200?1">
      <h3>Project 1</h3>
      <p>Modern website design</p>
    </div>

    <div class="card">
      <img src="https://picsum.photos/300/200?2">
      <h3>Project 2</h3>
      <p>Portfolio website</p>
    </div>

    <div class="card">
      <img src="https://picsum.photos/300/200?3">
      <h3>Project 3</h3>
      <p>UI/UX Design</p>
    </div>

  </div>
</section>

  <section id="contact" class="section">
    <h1>Contact Me</h1>

    <form id="contact-form">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" placeholder="Message" required></textarea>
      <button class="submit-btn">Send Message</button>
    </form>
  </section>

</div>

<script src="script.js"></script>

</body>
</html>
